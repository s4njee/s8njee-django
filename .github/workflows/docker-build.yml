name: Build And Deploy Netcup

on:
  push:
    branches:
      - main
    paths-ignore:
      - k8s/overlays/netcup/kustomization.yaml
  workflow_dispatch:

concurrency:
  group: netcup-deploy
  cancel-in-progress: true

jobs:
  build:
    if: github.actor != 'github-actions[bot]'
    name: Build image and update netcup
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      REGISTRY: registry.s8njee.com
      IMAGE_NAME: s8njee-web
      IMAGE_TAG: sha-${{ github.sha }}

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Build and push image
        uses: docker/build-push-action@v6
        with:
          context: ./blog
          file: ./blog/Dockerfile
          platforms: linux/amd64
          push: true
          tags: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ env.IMAGE_TAG }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update netcup image tag
        run: |
          sed -i.bak "s|newTag: .*|newTag: ${IMAGE_TAG}|" k8s/overlays/netcup/kustomization.yaml
          rm k8s/overlays/netcup/kustomization.yaml.bak

      - name: Commit netcup manifest update
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add k8s/overlays/netcup/kustomization.yaml

          if git diff --cached --quiet; then
            echo "Netcup manifest already points at ${IMAGE_TAG}"
            exit 0
          fi

          git commit -m "Deploy ${IMAGE_TAG} to netcup [skip ci]"
          git push origin HEAD:main
