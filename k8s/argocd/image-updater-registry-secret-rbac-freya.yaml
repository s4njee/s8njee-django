apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: argocd-image-updater-registry-secret-reader
  namespace: default
rules:
  - apiGroups:
      - ""
    resources:
      - secrets
    resourceNames:
      - regcred
    verbs:
      - get
---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: argocd-image-updater-registry-secret-reader
  namespace: default
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: argocd-image-updater-registry-secret-reader
subjects:
  - kind: ServiceAccount
    name: argocd-image-updater-controller
    namespace: argocd
