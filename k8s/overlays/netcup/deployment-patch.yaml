apiVersion: apps/v1
kind: Deployment
metadata:
  name: s8njee-web
spec:
  template:
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      initContainers:
        - name: wait-for-postgres
          image: postgres:18.3-alpine3.23
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: s8njee-web-config
            - secretRef:
                name: s8njee-web-secrets
          command:
            - sh
            - -c
            - |
              DB_HOST="${S8NJEE_POSTGRES_SERVICE_HOST:-${DB_HOST:-}}"
              DB_PORT="${S8NJEE_POSTGRES_SERVICE_PORT:-${DB_PORT:-5432}}"
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do sleep 2; done
      containers:
        - name: web
          readinessProbe:
            httpGet:
              httpHeaders:
                - name: Host
                  value: blog.s8njee.com
          livenessProbe:
            httpGet:
              httpHeaders:
                - name: Host
                  value: blog.s8njee.com
