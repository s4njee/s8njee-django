apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: s8njee-postgres
spec:
  serviceName: s8njee-postgres-headless
  replicas: 1
  selector:
    matchLabels:
      app: s8njee-postgres
  template:
    metadata:
      labels:
        app: s8njee-postgres
    spec:
      containers:
        - name: postgres
          image: postgres:18.3-alpine3.23
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          env:
            - name: POSTGRES_USER
              value: s8njee
            - name: POSTGRES_DB
              value: s8njee
          envFrom:
            - secretRef:
                name: s8njee-web-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes:
          - ReadWriteOnce
        resources:
          requests:
            storage: 10Gi
