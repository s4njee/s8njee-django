apiVersion: apps/v1
kind: Deployment
metadata:
  name: s8njee-celery-worker
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s8njee-celery-worker
  template:
    metadata:
      labels:
        app: s8njee-celery-worker
    spec:
      imagePullSecrets:
        - name: registry-s8njee-pull
      initContainers:
        - name: wait-for-postgres
          image: postgres:18.3-alpine3.23
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: s8njee-web-config
            - secretRef:
                name: s8njee-web-secrets
          command:
            - sh
            - -c
            - |
              DB_HOST="${S8NJEE_POSTGRES_SERVICE_HOST:-${DB_HOST:-}}"
              DB_PORT="${S8NJEE_POSTGRES_SERVICE_PORT:-${DB_PORT:-5432}}"
              until pg_isready -h "$DB_HOST" -p "$DB_PORT" -U "$DB_USER" -d "$DB_NAME"; do sleep 2; done
      containers:
        - name: worker
          image: s8njee-web:latest
          imagePullPolicy: IfNotPresent
          envFrom:
            - configMapRef:
                name: s8njee-web-config
            - secretRef:
                name: s8njee-web-secrets
          command:
            - /bin/sh
            - -c
            - |
              export DJANGO_SETTINGS_MODULE=blog.settings.production
              DB_HOST="${S8NJEE_POSTGRES_SERVICE_HOST:-${DB_HOST:-}}"
              DB_PORT="${S8NJEE_POSTGRES_SERVICE_PORT:-${DB_PORT:-5432}}"
              export DB_HOST DB_PORT
              exec uv run celery -A blog worker --loglevel=info --concurrency=4
          resources:
            requests:
              cpu: 200m
              memory: 512Mi
            limits:
              cpu: "2"
              memory: 1Gi
