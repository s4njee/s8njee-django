apiVersion: apps/v1
kind: Deployment
metadata:
  name: s8njee-postgres
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s8njee-postgres
  template:
    metadata:
      labels:
        app: s8njee-postgres
    spec:
      nodeSelector:
        kubernetes.io/hostname: freya
      containers:
        - name: postgres
          image: postgres:18.3-alpine3.23
          imagePullPolicy: IfNotPresent
          ports:
            - name: postgres
              containerPort: 5432
          envFrom:
            - secretRef:
                name: s8njee-web-secrets
          volumeMounts:
            - name: data
              mountPath: /var/lib/postgresql/data
          readinessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            periodSeconds: 10
            failureThreshold: 6
          livenessProbe:
            exec:
              command:
                - sh
                - -c
                - pg_isready -U "$POSTGRES_USER" -d "$POSTGRES_DB"
            initialDelaySeconds: 20
            periodSeconds: 20
            failureThreshold: 6
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
      volumes:
        - name: data
          persistentVolumeClaim:
            claimName: s8njee-postgres-data-freya
