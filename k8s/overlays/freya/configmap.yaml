apiVersion: v1
kind: ConfigMap
metadata:
  name: s8njee-web-config
data:
  DEBUG: "False"
  ENABLE_SSL: "False"
  ALLOWED_HOSTS: "192.168.1.248,localhost,127.0.0.1"
  CSRF_TRUSTED_ORIGINS: "http://192.168.1.248:4201"
  DB_ENGINE: "django.db.backends.postgresql"
  DB_NAME: "s8njee"
  DB_HOST: "s8njee-postgres"
  DB_PORT: "5432"
  DB_BACKUP_BUCKET: "s8njee-photoblog"
  DB_BACKUP_PREFIX: "backups/postgres/freya/s8njee"
  DB_BACKUP_EXCLUDED_TABLES: "django_session"
  AWS_STORAGE_BUCKET_NAME: "s8njee-photoblog"
  AWS_S3_REGION_NAME: "us-east-1"
