apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization
namespace: default
resources:
  - ../../base
  - configmap.yaml
  - postgres-pvc.yaml
  - postgres-deployment.yaml
  - postgres-service.yaml
generatorOptions:
  disableNameSuffixHash: true
secretGenerator:
  - name: s8njee-web-secrets
    envs:
      - secret.env
patches:
  - path: deployment-patch.yaml
  - path: service-patch.yaml
images:
  - name: s8njee-web
    newName: 192.168.1.156:5001/s8njee-web
    newTag: 20260323-184500-amd64
