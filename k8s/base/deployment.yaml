apiVersion: apps/v1
kind: Deployment
metadata:
  name: s8njee-web
spec:
  replicas: 1
  selector:
    matchLabels:
      app: s8njee-web
  template:
    metadata:
      labels:
        app: s8njee-web
    spec:
      containers:
        - name: web
          image: s8njee-web:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8000
          envFrom:
            - configMapRef:
                name: s8njee-web-config
            - secretRef:
                name: s8njee-web-secrets
          startupProbe:
            tcpSocket:
              port: http
            periodSeconds: 5
            failureThreshold: 60
          readinessProbe:
            httpGet:
              path: /
              port: http
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
            failureThreshold: 3
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 512Mi
