<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Blog{% endblock %}</title>
    <link rel="apple-touch-icon" sizes="180x180" href="/static/favicon/apple-touch-icon.png?v=4">
    <link rel="icon" type="image/png" sizes="96x96" href="/static/favicon/favicon-96x96.png?v=4">
    <link rel="icon" type="image/svg+xml" href="/static/favicon/favicon.svg?v=4">
    <link rel="icon" type="image/x-icon" href="/static/favicon/favicon.ico?v=4">
    <link rel="manifest" href="/static/favicon/site.webmanifest?v=4">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: Helvetica, Arial, sans-serif; line-height: 1.7; color: #e0e0e0; background: #111; max-width: 960px; margin: 0 auto; padding: 2rem; }
        header { border-bottom: 2px solid #555; padding-bottom: 1rem; margin-bottom: 2rem; }
        header h1 a { text-decoration: none; color: #fff; }
        .layout { display: flex; gap: 3rem; }
        .main { flex: 1; }
        .sidebar { width: 220px; flex-shrink: 0; }
        .sidebar h3 { margin-bottom: 0.5rem; font-size: 1rem; }
        .sidebar ul { list-style: none; }
        .sidebar li { margin-bottom: 0.3rem; }
        .sidebar a { text-decoration: none; color: #aaa; font-size: 0.9rem; }
        .sidebar a:hover { color: #fff; }
        .sidebar .count { color: #666; }
        article { margin-bottom: 3rem; }
        article h2 a { text-decoration: none; color: #fff; }
        article h2 a:hover { color: #aaa; }
        .meta { color: #777; font-size: 0.9rem; margin-bottom: 1rem; }
        .content { margin-top: 1rem; }
        article p { margin-bottom: 1em; }
        a.back-link { color: #fff; }
        .pagination { margin-top: 2rem; }
        .pagination a { margin-right: 1rem; }
        nav { display: flex; gap: 1.5rem; margin-top: 0.5rem; }
        nav a { text-decoration: none; color: #aaa; font-size: 0.95rem; }
        nav a:hover { color: #fff; }
        @media (max-width: 700px) {
            .layout { flex-direction: column; }
            .sidebar { width: 100%; }
        }
    </style>
</head>
<body>
    <header>
        <h1><a href="{% url 'post_list' %}">Sanjee's Journal</a></h1>
        <nav>
            <a href="{% url 'post_list' %}">Blog</a>
            <a href="{% url 'album_list' %}">Photos</a>
        </nav>
    </header>
    <div class="layout">
        <main class="main">
            {% block content %}{% endblock %}
        </main>
        <aside class="sidebar">
            <h3>Archive</h3>
            <ul>
            {% for m in archive_months %}
                <li>
                    <a href="{% url 'post_archive_month' m.month.year m.month.month %}">
                        {{ m.month|date:"F Y" }}
                    </a>
                    <span class="count">({{ m.count }})</span>
                </li>
            {% empty %}
                <li>No posts yet.</li>
            {% endfor %}
            </ul>
        </aside>
    </div>
</body>
</html>
