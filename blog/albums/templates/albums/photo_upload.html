{% extends "albums/base.html" %}
{% block title %}Upload to {{ album.title }}{% endblock %}
{% block content %}
<h1 style="margin-bottom:1.5rem">Upload to "{{ album.title }}"</h1>

<div id="upload-area" style="border:2px dashed #333;border-radius:8px;padding:3rem;text-align:center;cursor:pointer;transition:border-color .2s;margin-bottom:1.5rem"
     ondragover="event.preventDefault();this.style.borderColor='#2563eb'"
     ondragleave="this.style.borderColor='#333'"
     ondrop="event.preventDefault();this.style.borderColor='#333';addFiles(event.dataTransfer.files)"
     onclick="document.getElementById('file-input').click()">
  <p style="color:#888;font-size:1.1rem">Drop photos here or click to select</p>
  <input type="file" id="file-input" multiple accept="image/*,.nef,.cr2,.cr3,.dng,.arw,.orf,.raf,.rw2" style="display:none" onchange="addFiles(this.files)">
</div>

<div id="queue" style="margin-bottom:1.5rem"></div>

<div id="controls" style="display:none;gap:1rem;align-items:center;margin-bottom:1.5rem">
  <button id="start-btn" class="btn" onclick="startUpload()">Upload <span id="file-count"></span> photos</button>
  <button class="btn" style="background:#333" onclick="clearQueue()">Clear</button>
  <span id="progress-text" style="color:#888;margin-left:1rem"></span>
</div>

<div id="done-msg" style="display:none">
  <p style="color:#4ade80;margin-bottom:1rem">✓ All photos uploaded!</p>
  <a href="{% url 'album_detail' album.pk %}" class="btn">View Album</a>
</div>

<script>
const UPLOAD_URL = "{% url 'photo_upload_single' album.pk %}";
const CSRF = "{{ csrf_token }}";
let queue = [];
let uploading = false;

function randomUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

const RAW_EXTENSIONS = new Set(['nef','cr2','cr3','dng','arw','orf','raf','rw2']);

function isAcceptedFile(f) {
  if (f.type.startsWith('image/')) return true;
  const ext = f.name.split('.').pop().toLowerCase();
  return RAW_EXTENSIONS.has(ext);
}

function addFiles(fileList) {
  for (const f of fileList) {
    if (!isAcceptedFile(f)) continue;
    const id = randomUUID();
    queue.push({
      id,
      file: f,
      status: "pending",
      retries: 0,
      serverId: null,
      pollUrl: null,
      error: null,
    });
    renderItem(queue[queue.length - 1], RAW_EXTENSIONS.has(f.name.split('.').pop().toLowerCase()));
  }
  updateControls();
  refreshDoneState();
}

function renderItem(item, isRaw = false) {
  const { id, file } = item;
  const el = document.createElement("div");
  el.id = "item-" + id;
  el.style.cssText = "display:flex;align-items:center;gap:1rem;padding:.5rem 0;border-bottom:1px solid #222";
  // RAW files can't be previewed natively in the browser, show a placeholder instead
  const previewHtml = isRaw
    ? `<div style="width:48px;height:48px;border-radius:4px;background:#1a1a2e;display:flex;align-items:center;justify-content:center;font-size:.6rem;color:#888;text-align:center;font-weight:600;letter-spacing:.5px">RAW</div>`
    : `<img src="${URL.createObjectURL(file)}" style="width:48px;height:48px;object-fit:cover;border-radius:4px">`;
  el.innerHTML = `
    ${previewHtml}
    <div style="flex:1;min-width:0">
      <div style="font-size:.85rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${file.name}</div>
      ${isRaw ? '<div style="font-size:.75rem;color:#888;margin-top:2px">RAW — will be converted to AVIF on upload</div>' : ''}
      <div class="progress-bar" style="height:4px;background:#222;border-radius:2px;margin-top:4px;overflow:hidden">
        <div class="progress-fill" style="height:100%;width:0%;background:#2563eb;transition:width .2s"></div>
      </div>
    </div>
    <div style="display:flex;flex-direction:column;align-items:flex-end;gap:.25rem">
      <span class="status" style="font-size:.8rem;color:#888">Pending</span>
      <button class="retry-btn" type="button" style="display:none;background:#333;color:#fff;border:none;padding:.35rem .6rem;border-radius:4px;cursor:pointer">Retry</button>
    </div>
  `;
  document.getElementById("queue").appendChild(el);
  el.querySelector(".retry-btn").addEventListener("click", () => retryUpload(id));
}

function updateControls() {
  const pending = queue.filter(q => q.status === "pending").length;
  const ctrl = document.getElementById("controls");
  ctrl.style.display = pending > 0 || queue.some(q => q.status === "error") ? "flex" : "none";
  document.getElementById("file-count").textContent = queue.filter(q => q.status === "pending" || q.status === "uploading").length;
}

function refreshDoneState() {
  const allDone = queue.length > 0 && queue.every(q => q.status === "done");
  document.getElementById("done-msg").style.display = allDone ? "block" : "none";
}

async function startUpload() {
  if (uploading) return;
  uploading = true;
  document.getElementById("start-btn").disabled = true;
  document.getElementById("start-btn").style.opacity = "0.5";
  document.getElementById("upload-area").style.display = "none";

  let done = 0;
  const total = queue.filter(q => q.status === "pending").length;

  for (const item of queue) {
    if (item.status !== "pending") continue;
    await uploadOne(item);

    done++;
    document.getElementById("progress-text").textContent = done + " / " + total + " complete";
  }

  uploading = false;
  document.getElementById("start-btn").disabled = false;
  document.getElementById("start-btn").style.opacity = "1";
  updateControls();
  refreshDoneState();
}

function uploadFile(file, onProgress) {
  return new Promise((resolve, reject) => {
    const xhr = new XMLHttpRequest();
    xhr.open("POST", UPLOAD_URL);
    xhr.setRequestHeader("X-CSRFToken", CSRF);

    xhr.upload.onprogress = (e) => {
      if (e.lengthComputable) onProgress(Math.round(e.loaded / e.total * 100));
    };
    xhr.onload = () => {
      let payload = {};
      try {
        payload = xhr.responseText ? JSON.parse(xhr.responseText) : {};
      } catch (err) {
        payload = {};
      }
      if (xhr.status >= 200 && xhr.status < 300) {
        resolve(payload);
        return;
      }
      reject(new Error(payload.error || xhr.statusText || `HTTP ${xhr.status}`));
    };
    xhr.onerror = () => reject(new Error("Network error"));

    const fd = new FormData();
    fd.append("image", file);
    xhr.send(fd);
  });
}

function setItemStatus(item, statusText, color, fillColor) {
  const el = document.getElementById("item-" + item.id);
  const statusEl = el.querySelector(".status");
  const fillEl = el.querySelector(".progress-fill");
  const retryBtn = el.querySelector(".retry-btn");
  statusEl.textContent = statusText;
  statusEl.style.color = color;
  fillEl.style.background = fillColor || fillEl.style.background;
  retryBtn.style.display = "none";
}

function showRetry(item, message) {
  item.status = "error";
  item.error = message;
  const el = document.getElementById("item-" + item.id);
  const statusEl = el.querySelector(".status");
  const fillEl = el.querySelector(".progress-fill");
  const retryBtn = el.querySelector(".retry-btn");
  statusEl.textContent = message || "Failed";
  statusEl.style.color = "#ef4444";
  fillEl.style.background = "#ef4444";
  retryBtn.style.display = "inline-flex";
  updateControls();
  refreshDoneState();
}

function markDone(item, payload) {
  item.status = "done";
  item.error = null;
  item.serverId = payload.id;
  const el = document.getElementById("item-" + item.id);
  const statusEl = el.querySelector(".status");
  const fillEl = el.querySelector(".progress-fill");
  const retryBtn = el.querySelector(".retry-btn");
  fillEl.style.width = "100%";
  fillEl.style.background = "#4ade80";
  statusEl.textContent = "✓";
  statusEl.style.color = "#4ade80";
  retryBtn.style.display = "none";
  updateControls();
  refreshDoneState();
}

function pollStatus(item, pollUrl) {
  const tick = async () => {
    try {
      const response = await fetch(pollUrl, { headers: { "X-CSRFToken": CSRF } });
      const payload = await response.json();
      if (payload.status === "ready") {
        markDone(item, payload);
        return;
      }
      if (payload.status === "failed") {
        showRetry(item, payload.error || "Failed to process image");
        return;
      }
      setItemStatus(item, "Processing…", "#f59e0b");
      window.setTimeout(tick, 1500);
    } catch (err) {
      showRetry(item, err.message || "Status check failed");
    }
  };
  window.setTimeout(tick, 1500);
}

async function uploadOne(item) {
  item.status = "uploading";
  const el = document.getElementById("item-" + item.id);
  const statusEl = el.querySelector(".status");
  const fillEl = el.querySelector(".progress-fill");
  const retryBtn = el.querySelector(".retry-btn");
  retryBtn.style.display = "none";
  statusEl.textContent = "Uploading…";
  statusEl.style.color = "#2563eb";

  try {
    const payload = await uploadFile(item.file, (pct) => {
      fillEl.style.width = pct + "%";
    });

    item.serverId = payload.id;
    item.pollUrl = payload.poll_url;

    if (payload.status === "ready" || payload.url) {
      markDone(item, payload);
    } else {
      setItemStatus(item, "Processing…", "#f59e0b");
      pollStatus(item, payload.poll_url);
    }
  } catch (err) {
    showRetry(item, err.message || "Upload failed");
  }
}

function retryUpload(id) {
  const item = queue.find(q => q.id === id);
  if (!item || uploading) return;
  item.status = "pending";
  item.error = null;
  const el = document.getElementById("item-" + item.id);
  const fillEl = el.querySelector(".progress-fill");
  fillEl.style.width = "0%";
  fillEl.style.background = "#2563eb";
  const statusEl = el.querySelector(".status");
  statusEl.textContent = "Pending";
  statusEl.style.color = "#888";
  updateControls();
  refreshDoneState();
  uploadOne(item);
}

function clearQueue() {
  queue = queue.filter(q => q.status === "done");
  document.getElementById("queue").innerHTML = "";
  updateControls();
  refreshDoneState();
}
</script>
{% endblock %}
